name: IR_SSH_Shahan_Style_2026_ZROK
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH Server
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server jq curl

          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd

          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

          sudo service ssh restart

      - name: Install Zrok (Stable Method)
        run: |
          VERSION=$(curl -s https://api.github.com/repos/openziti/zrok/releases/latest | jq -r .tag_name)
          FILE="zrok_${VERSION#v}_linux_amd64.tar.gz"

          curl -L https://github.com/openziti/zrok/releases/download/${VERSION}/${FILE} -o zrok.tar.gz
          tar -xzf zrok.tar.gz

          sudo mv zrok /usr/local/bin/
          sudo chmod +x /usr/local/bin/zrok

          zrok version

      - name: Enable Zrok Environment
        run: |
          zrok enable ${{ secrets.ZROK_ENABLE_TOKEN }}

      - name: Start Public TCP Tunnel
        run: |
          set -e

          zrok share public tcp://localhost:22 > zrok.log 2>&1 &
          sleep 8

          if ! grep -q "tcp://" zrok.log; then
            echo "❌ Public TCP not allowed in your plan."
            cat zrok.log
            exit 1
          fi

          ENDPOINT=$(grep -o 'tcp://[^ ]*' zrok.log | head -n1)
          HOST=$(echo $ENDPOINT | sed 's|tcp://||' | cut -d':' -f1)
          PORT=$(echo $ENDPOINT | cut -d':' -f3)

          echo "======================================"
          echo "✅ SSH Ready via ZROK"
          echo "Host: $HOST"
          echo "Port: $PORT"
          echo "User: shahan_user"
          echo "Pass: pass1234"
          echo "Valid for: 6 Hours"
          echo "======================================"

      - name: Keep Runner Alive
        run: |
          echo "SSH Server is live..."
          sleep 21600
