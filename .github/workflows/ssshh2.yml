name: IR_VLESS_Reality_Shahan_Ultimate
on:
  workflow_dispatch:

jobs:
  deploy_vless:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: All-in-One Deployment
        run: |
          # 1. نصب ابزارهای لازم
          sudo apt-get update
          sudo apt-get install -y jq curl uuid-runtime
          curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh | sudo bash -s -- install

          # 2. تولید متغیرها
          UUID=$(uuidgen)
          # استخراج کلیدها با متد مطمئن‌تر
          KEYS=$(/usr/local/bin/xray x25519)
          PRIV=$(echo "$KEYS" | grep "Private key:" | cut -d' ' -f3)
          PUB=$(echo "$KEYS" | grep "Public key:" | cut -d' ' -f3)
          SID=$(openssl rand -hex 8)

          # 3. ایجاد کانفیگ Xray
          sudo bash -c "cat <<EOF > /usr/local/etc/xray/config.json
          {
            \"inbounds\": [{
              \"port\": 443,
              \"protocol\": \"vless\",
              \"settings\": {
                \"clients\": [{\"id\": \"$UUID\", \"flow\": \"xtls-rprx-vision\"}],
                \"decryption\": \"none\"
              },
              \"streamSettings\": {
                \"network\": \"tcp\",
                \"security\": \"reality\",
                \"realitySettings\": {
                  \"show\": false,
                  \"dest\": \"www.google.com:443\",
                  \"xver\": 0,
                  \"serverNames\": [\"www.google.com\"],
                  \"privateKey\": \"$PRIV\",
                  \"shortIds\": [\"$SID\"]
                }
              }
            }],
            \"outbounds\": [{\"protocol\": \"freedom\"}]
          }
          EOF"

          sudo systemctl restart xray

          # 4. راه اندازی Ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install -y ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 443 --log=stdout > ngrok.log &
          sleep 20

          # 5. استخراج دقیق آدرس و پورت
          RAW_ADDR=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url')
          # حذف tcp:// از ابتدای آدرس
          CLEAN_ADDR=${RAW_ADDR#tcp://}
          
          # جدا کردن هاست و پورت
          REAL_HOST=$(echo $CLEAN_ADDR | cut -d':' -f1)
          REAL_PORT=$(echo $CLEAN_ADDR | cut -d':' -f2)

          # 6. چاپ لینک نهایی بدون هیچ خطایی
          echo ""
          echo "=========================================================================="
          echo "✅ کانفیگ شما با موفقیت آماده شد:"
          echo ""
          echo "vless://$UUID@$REAL_HOST:$REAL_PORT?security=reality&sni=www.google.com&fp=chrome&pbk=$PUB&sid=$SID&type=tcp&flow=xtls-rprx-vision#Shahan_Reality"
          echo ""
          echo "=========================================================================="
          echo "⚠️ توجه: این لینک به مدت 6 ساعت فعال می‌ماند."

      - name: Keep Runner Alive
        run: sleep 21600
