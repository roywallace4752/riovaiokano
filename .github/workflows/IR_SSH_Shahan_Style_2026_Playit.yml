name: IR_SSH_Shahan_Style_2026_Free_UDP
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH & Gost Bridge
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl
          
          # تنظیمات کاربر
          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd
          sudo service ssh start

          # نصب Gost (برای تبدیل TCP به UDP)
          curl -L https://github.com/go-gost/gost/releases/download/v3.0.0-rc.10/gost_3.0.0-rc.10_linux_amd64.tar.gz | tar -xz
          sudo mv gost /usr/local/bin/gost
          
          # اجرای Gost در پس‌زمینه: تبدیل پورت 22 TCP به پورت 5555 UDP
          nohup gost -L=udp://:5555/127.0.0.1:22 > gost.log 2>&1 &

      - name: Install Playit
        run: |
          curl -L -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit
          sudo mv playit /usr/local/bin/playit

      - name: Start Playit Tunnel
        env:
          SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY }}
        run: |
          mkdir -p ~/.config/playit_gg
          echo "secret_key = \"$SECRET_KEY\"" > ~/.config/playit_gg/playit.toml
          
          # اجرای Playit در حالت Headless
          nohup playit --no-gui > playit.log 2>&1 &
          sleep 25
          tail -n 20 playit.log

      - name: Connection Information
        run: |
          echo "======================================"
          echo "✅ SSH over UDP is Ready (FREE MODE)"
          echo "1. در سایت Playit یک تونل از نوع 'UDP' بسازید."
          echo "2. پورت محلی (Local Port) را روی 5555 تنظیم کنید."
          echo "3. آدرس ثابت خود را بردارید (مثلاً: host.at.ply.gg:12345)"
          echo "======================================"

      - name: Keep Runner Alive
        run: |
          for i in {1..360}; do
            echo "Heartbeat $i - Session Active"
            sleep 60
          done
