name: IR_SSH_Shahan_Style_2026_Playit
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl

          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd

          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

          sudo service ssh start
          sudo service ssh status

      - name: Install Playit (Stable Binary)
        run: |
          curl -L -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit
          sudo mv playit /usr/local/bin/playit

          # تست سالم بودن باینری
          playit --help | head -n 5

      - name: Start Playit Tunnel
        env:
          SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY }}
        run: |
          mkdir -p ~/.config/playit_gg
          echo "secret_key = \"$SECRET_KEY\"" > ~/.config/playit_gg/playit.toml

          nohup playit --no-gui > playit.log 2>&1 &

          sleep 25

          echo "========== PLAYIT LOG =========="
          tail -n 30 playit.log
          echo "================================"

      - name: Connection Info
        run: |
          echo "======================================"
          echo "SSH USER: shahan_user"
          echo "SSH PASS: pass1234"
          echo ""
          echo "⚠️ آدرس و پورت را از پنل Playit → Tunnels بردار."
          echo "======================================"

      - name: Keep Runner Alive
        run: |
          for i in {1..360}; do
            echo "Heartbeat $i - Active"
            sleep 60
          done
