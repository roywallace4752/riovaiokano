name: IR_SSH_Shahan_Style_2026_ZROK
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl jq

          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd
          
          sudo service ssh start

      - name: Install Zrok
        run: |
          curl -sSfL https://get.zrok.io | sudo bash

      - name: Enable Zrok Environment
        run: |
          zrok enable ${{ secrets.ZROK_ENABLE_TOKEN }}

      - name: Start Zrok TCP Tunnel
        run: |
          zrok share public tcp://localhost:22 > zrok.log 2>&1 &
          sleep 10
          
          PUBLIC_ENDPOINT=$(grep -o 'tcp://.*' zrok.log | head -n1)
          
          HOST=$(echo $PUBLIC_ENDPOINT | sed 's/tcp:\/\///' | cut -d':' -f1)
          PORT=$(echo $PUBLIC_ENDPOINT | cut -d':' -f3)

          echo "======================================"
          echo "✅ SSH Ready via ZROK"
          echo "Host: $HOST"
          echo "Port: $PORT"
          echo "User: shahan_user"
          echo "Pass: pass1234"
          echo "Valid for: 6 Hours"
          echo "======================================"

      - name: Keep Runner Alive
        run: |
          echo "SSH Server is live via Zrok."
          sleep 21600
