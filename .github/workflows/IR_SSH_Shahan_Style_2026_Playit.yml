name: IR_SSH_Shahan_Style_2026_Playit
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server sshpass jq curl

          # ایجاد کاربر
          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd

          # فعال‌سازی پسورد لاگین
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

          # استارت SSH
          sudo service ssh start

      - name: Install Playit.gg (Direct Binary - Stable)
        run: |
          # دانلود آخرین نسخه لینوکس
          curl -L -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          
          chmod +x playit
          sudo mv playit /usr/local/bin/playit

          playit --version

      - name: Configure & Start Playit Tunnel
        env:
          SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY }}
        run: |
          mkdir -p ~/.config/playit_gg
          echo "secret_key = \"$SECRET_KEY\"" > ~/.config/playit_gg/playit.toml

          # اجرای کلاینت
          nohup playit --no-gui > playit.log 2>&1 &

          # صبر برای اتصال
          sleep 20

          echo "======================================"
          echo "Playit Status Check"

          if grep -qi "connected" playit.log; then
            echo "Tunnel Connection: SUCCESS"
          else
            echo "Tunnel may still be initializing..."
            tail -n 20 playit.log
          fi

          echo "======================================"

      - name: Connection Information
        run: |
          echo "======================================"
          echo "SSH Username: shahan_user"
          echo "SSH Password: pass1234"
          echo ""
          echo "⚠️ آدرس و پورت تونل را از پنل Playit.gg → Tunnels بردارید."
          echo "======================================"

      - name: Keep Runner Alive (6 Hours)
        run: |
          echo "Runner is active for 6 hours."
          for i in {1..360}; do
            echo "Heartbeat $i - SSH Tunnel Active"
            sleep 60
          done
