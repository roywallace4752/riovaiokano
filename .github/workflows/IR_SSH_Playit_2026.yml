name: IR_SSH_Playit_2026
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH User
        run: |
          sudo apt-get install -y openssh-server
          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd
          sudo service ssh start

      - name: Install Playit
        run: |
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data ./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          sudo apt update && sudo apt install -y playit

      - name: Run Playit & Show Claim URL
        run: |
          playit 2>&1 | tee playit.log &
          
          # صبر کن تا URL بیاد
          for i in $(seq 1 30); do
            sleep 5
            if grep -q "playit.gg/claim" playit.log; then
              echo "======================================"
              grep "playit.gg/claim" playit.log
              echo "======================================"
              break
            fi
            echo "منتظر URL... ($((i*5))s)"
          done
          
          cat playit.log

      - name: Keep Alive
        run: sleep 21600
