name: IR_SSH_Shahan_Original
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup SSH Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server sshpass jq curl
          
          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd
          
          sudo service ssh start

      - name: Install & Start Ngrok
        run: |
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install -y ngrok
          
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          
          ngrok tcp 22 --log=stdout > ngrok.log &
          sleep 10
          
          TUNNEL_ADDR=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\///')
          
          HOST=$(echo $TUNNEL_ADDR | cut -d':' -f1)
          PORT=$(echo $TUNNEL_ADDR | cut -d':' -f2)

          echo "======================================"
          echo "✅ SSH VPN Ready (Shahan Style)"
          echo "Host: $HOST"
          echo "Port: $PORT"
          echo "User: shahan_user"
          echo "Pass: pass1234"
          echo "Valid for: 6 Hours"
          echo "======================================"

      - name: Keep Runner Alive
        run: |
          echo "SSH Server is live via Ngrok."
          sleep 21600
