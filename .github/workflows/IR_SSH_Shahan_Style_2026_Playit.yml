name: IR_SSH_Shahan_Style_2026_Free_UDP
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl jq

          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd

          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh start
          sudo service ssh status

      - name: Install Latest Gost v3 (Dynamic)
        run: |
          # گرفتن لینک آخرین نسخه لینوکس amd64
          GOST_URL=$(curl -s https://api.github.com/repos/go-gost/gost/releases/latest \
            | jq -r '.assets[] | select(.name | test("linux_amd64.tar.gz$")) | .browser_download_url')

          echo "Downloading: $GOST_URL"

          curl -L "$GOST_URL" -o gost.tar.gz
          tar -xzf gost.tar.gz

          chmod +x gost
          sudo mv gost /usr/local/bin/gost

          gost -V

      - name: Start Gost UDP Bridge
        run: |
          nohup gost -L udp://:5555/127.0.0.1:22 > gost.log 2>&1 &
          sleep 3
          tail -n 10 gost.log || true

      - name: Install Playit
        run: |
          curl -L -o playit https://github.com/playit-cloud/playit-agent/releases/latest/download/playit-linux-amd64
          chmod +x playit
          sudo mv playit /usr/local/bin/playit

      - name: Start Playit Tunnel
        env:
          SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY }}
        run: |
          mkdir -p ~/.config/playit_gg
          echo "secret_key = \"$SECRET_KEY\"" > ~/.config/playit_gg/playit.toml

          nohup playit --no-gui > playit.log 2>&1 &
          sleep 25

          echo "===== PLAYIT LOG ====="
          tail -n 30 playit.log
          echo "======================"

      - name: Connection Info
        run: |
          echo "======================================"
          echo "✅ SSH over UDP is Ready"
          echo "Local UDP Port: 5555"
          echo "SSH User: shahan_user"
          echo "SSH Pass: pass1234"
          echo "تونل UDP را در پنل Playit روی پورت 5555 تنظیم کن."
          echo "======================================"

      - name: Keep Runner Alive
        run: |
          for i in {1..360}; do
            echo "Heartbeat $i - Active"
            sleep 60
          done
