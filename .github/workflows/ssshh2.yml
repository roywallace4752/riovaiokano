name: IR_SSH_Shahan_Style_2026_Serveo

on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH Environment
        run: |
          sudo apt-get update -y
          sudo apt-get install -y openssh-server autossh

          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd

          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config

          sudo service ssh start
          echo "✅ SSH Server Started"

      - name: Generate SSH Key
        run: |
          ssh-keygen -t rsa -b 2048 -f ~/.ssh/id_rsa -N ""
          # Disable host key checking for serveo
          echo "Host serveo.net" >> ~/.ssh/config
          echo "  StrictHostKeyChecking no" >> ~/.ssh/config
          echo "  ServerAliveInterval 60" >> ~/.ssh/config

      - name: Start Serveo Tunnel
        run: |
          # shahan2026 = subdomain ثابت - هر بار همینه!
          autossh -M 0 -f -N \
            -o "StrictHostKeyChecking=no" \
            -o "ServerAliveInterval=30" \
            -o "ServerAliveCountMax=3" \
            -R shahan2026:22:localhost:22 \
            serveo.net

          sleep 5

          echo "======================================"
          echo "✅ SSH Ready (Shahan Style - Serveo)"
          echo "--------------------------------------"
          echo "🌐 Host: serveo.net"
          echo "🔌 Port: 80"
          echo "🖥️  Subdomain: shahan2026"
          echo "--------------------------------------"
          echo "User: shahan_user"
          echo "Pass: pass1234"
          echo "Valid for: 6 Hours"
          echo "======================================"
          echo ""
          echo "💻 دستور اتصال:"
          echo "ssh -J serveo.net shahan_user@shahan2026"

      - name: Keep Runner Alive
        run: |
          sleep 21600
