name: IR_VLESS_Reality_Shahan_Fixed
on:
  workflow_dispatch:

jobs:
  deploy_vless:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install & Run Everything
        run: |
          # 1. نصب پیش‌نیازها
          sudo apt-get update
          sudo apt-get install -y jq curl uuid-runtime
          curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh | sudo bash -s -- install
          
          # 2. تولید متغیرها
          UUID=$(uuidgen)
          KEYS=$(/usr/local/bin/xray x25519)
          PRIV=$(echo "$KEYS" | grep -i "Private key" | awk -F': ' '{print $2}' | tr -d ' ')
          PUB=$(echo "$KEYS" | grep -i "Public key" | awk -F': ' '{print $2}' | tr -d ' ')
          SID=$(openssl rand -hex 8)
          
          # 3. ساخت فایل کانفیگ (با روش ایمن برای YAML)
          sudo tee /usr/local/etc/xray/config.json > /dev/null <<EOF
          {
            "inbounds": [{
              "port": 443,
              "protocol": "vless",
              "settings": {
                "clients": [{"id": "$UUID", "flow": "xtls-rprx-vision"}],
                "decryption": "none"
              },
              "streamSettings": {
                "network": "tcp",
                "security": "reality",
                "realitySettings": {
                  "show": false,
                  "dest": "www.google.com:443",
                  "xver": 0,
                  "serverNames": ["www.google.com"],
                  "privateKey": "$PRIV",
                  "shortIds": ["$SID"]
                }
              }
            }],
            "outbounds": [{"protocol": "freedom"}]
          }
          EOF

          # 4. ری‌استارت سرویس
          sudo systemctl restart xray
          
          # 5. نصب و اجرای Ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install -y ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 443 --log=stdout > ngrok.log &
          sleep 20
          
          # 6. استخراج آدرس و چاپ لینک
          ADDR=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\///')
          HOST=$(echo "$ADDR" | cut -d':' -f1)
          PORT=$(echo "$ADDR" | cut -d':' -f2)
          
          echo "======================================"
          echo "✅ SHAHAN REALITY READY"
          echo "======================================"
          echo "vless://$UUID@$HOST:$PORT?security=reality&sni=www.google.com&fp=chrome&pbk=$PUB&sid=$SID&type=tcp&flow=xtls-rprx-vision#Shahan_Reality"
          echo "======================================"
          
      - name: Keep Alive
        run: sleep 21600
