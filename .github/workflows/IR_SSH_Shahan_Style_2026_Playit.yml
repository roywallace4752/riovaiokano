name: IR_SSH_Shahan_Style_2026_Playit
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup SSH Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server sshpass jq curl gpg
          
          # ایجاد کاربر
          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd
          
          # استارت سرویس SSH
          sudo service ssh start

      - name: Install Playit.gg Agent
        run: |
          # نصب کلید GPG
          curl -SsL https://playit-cloud.github.io/ppa/key.gpg | gpg --dearmor | sudo tee /etc/apt/trusted.gpg.d/playit.gpg >/dev/null
          
          # دستور اصلاح شده مخزن (دقت کنید: بین data و./ حتما یک فاصله وجود دارد) 
          echo "deb [signed-by=/etc/apt/trusted.gpg.d/playit.gpg] https://playit-cloud.github.io/ppa/data./" | sudo tee /etc/apt/sources.list.d/playit-cloud.list
          
          sudo apt update
          sudo apt install -y playit

      - name: Configure & Start Playit Tunnel
        env:
          SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY }}
        run: |
          # ایجاد دایرکتوری و فایل تنظیمات برای شناسایی خودکار سکرت کد 
          mkdir -p ~/.config/playit_gg
          echo "secret_key = \"$SECRET_KEY\"" > ~/.config/playit_gg/playit.toml
          
          # اجرای عامل در حالت بدون گرافیک
          playit --no-gui > playit.log 2>&1 &
          
          # انتظار برای برقراری اتصال Anycast
          sleep 20
          
          echo "======================================"
          echo "✅ SSH Server is live via Playit.gg"
          
          # بررسی صحت کلید و اتصال از روی لاگ‌ها 
          if grep -q "secret key valid" playit.log; then
            echo "Authentication: SUCCESS"
          else
            echo "Authentication: FAILED - Please check your PLAYIT_SECRET_KEY"
            tail -n 10 playit.log
            exit 1
          fi
          echo "======================================"

      - name: Connection Info
        run: |
          echo "======================================"
          echo "User: shahan_user"
          echo "Pass: pass1234"
          echo "آدرس و پورت ثابت خود را از پنل Playit.gg بخش Tunnels بردارید."
          echo "======================================"

      - name: Keep Alive
        run: |
          echo "Runner is active for 6 hours."
          for i in {1..360}; do
            echo "Keep-alive Heartbeat $i..."
            sleep 60
          done
