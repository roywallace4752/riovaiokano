name: IR_SSH_Shahan_Style_2026_zrok
on:
  workflow_dispatch:

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    
    steps:
      - name: Setup SSH Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server curl
          
          # تنظیم کاربر
          sudo useradd -m -s /bin/bash shahan_user
          echo "shahan_user:pass1234" | sudo chpasswd
          
          # فعال‌سازی ورود با پسورد
          sudo sed -i 's/#PasswordAuthentication yes/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo sed -i 's/PasswordAuthentication no/PasswordAuthentication yes/' /etc/ssh/sshd_config
          sudo service ssh start

      - name: Install & Enable zrok
        env:
          ZROK_TOKEN: ${{ secrets.ZROK_ENABLE_TOKEN }}
        run: |
          # دانلود آخرین نسخه باینری zrok [4]
          curl -sSL https://get.openziti.io/install.sh | sudo bash -s zrok
          
          # فعال‌سازی محیط در حالت بدون گرافیک
          zrok enable "$ZROK_TOKEN"

      - name: Start Private TCP Tunnel
        run: |
          # به اشتراک‌گذاری پورت 22 در مود tcpTunnel و حالت Headless
          # خروجی در فایل لاگ ذخیره می‌شود تا توکن دسترسی را استخراج کنیم
          nohup zrok share private localhost:22 --backend-mode tcpTunnel --headless > zrok.log 2>&1 &
          
          # انتظار برای ایجاد تونل
          sleep 15
          
          echo "======================================"
          echo "✅ zrok Tunnel is active"
          
          # استخراج Share Token از لاگ‌ها [3]
          ACCESS_TOKEN=$(grep -oP "access your share with: zrok access private \K\w+" zrok.log)
          
          if; then
            echo "❌ Failed to get Access Token. Check zrok.log:"
            cat zrok.log
            exit 1
          fi
          
          echo "YOUR ACCESS TOKEN: $ACCESS_TOKEN"
          echo "======================================"

      - name: Connection Guide
        run: |
          echo "======================================"
          echo "نحوه اتصال از سیستم شخصی شما:"
          echo "1. ابتدا کلاینت zrok را روی سیستم خود نصب کنید."
          echo "2. این دستور را در ترمینال سیستم خود بزنید:"
          echo "   zrok access private <YOUR_ACCESS_TOKEN> --bind 127.0.0.1:2222"
          echo "3. حالا با استفاده از Putty یا ترمینال به SSH وصل شوید:"
          echo "   ssh shahan_user@127.0.0.1 -p 2222"
          echo "======================================"

      - name: Keep Runner Alive
        run: |
          for i in {1..360}; do
            echo "Heartbeat $i - Tunnel is stable"
            sleep 60
          done
