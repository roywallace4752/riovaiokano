name: IR_VLESS_Reality_Shahan_Fixed
on:
  workflow_dispatch:
jobs:
  deploy_vless:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    steps:
      - name: Install & Run Everything
        run: |
          # 1. نصب پیش‌نیازها و Xray
          sudo apt-get update
          sudo apt-get install -y jq curl uuid-runtime
          curl -L https://github.com/XTLS/Xray-install/raw/main/install-release.sh | sudo bash -s -- install
          
          # 2. تولید UUID
          UUID=$(uuidgen)
          
          # 3. تولید کلیدها با debug
          echo "🔑 Generating X25519 keys..."
          KEYS=$(/usr/local/bin/xray x25519)
          echo "Raw output:"
          echo "$KEYS"
          
          # استخراج بهتر کلیدها
          PRIV=$(echo "$KEYS" | grep -i "Private key" | awk -F': ' '{print $2}' | tr -d ' ')
          PUB=$(echo "$KEYS" | grep -i "Public key" | awk -F': ' '{print $2}' | tr -d ' ')
          
          # بررسی مقادیر
          echo "Private Key: [$PRIV]"
          echo "Public Key: [$PUB]"
          
          # SID
          SID=$(openssl rand -hex 8)
          echo "Short ID: $SID"
          
          # بررسی اینکه همه متغیرها پر هستند
          if [ -z "$UUID" ] || [ -z "$PRIV" ] || [ -z "$PUB" ] || [ -z "$SID" ]; then
            echo "❌ ERROR: Some variables are empty!"
            echo "UUID: $UUID"
            echo "PRIV: $PRIV"
            echo "PUB: $PUB"
            echo "SID: $SID"
            exit 1
          fi
          
          # 4. ساخت فایل کانفیگ
          sudo bash -c "cat > /usr/local/etc/xray/config.json << 'EOFCONFIG'
          {
            \"inbounds\": [{
              \"port\": 443,
              \"protocol\": \"vless\",
              \"settings\": {
                \"clients\": [{\"id\": \"$UUID\", \"flow\": \"xtls-rprx-vision\"}],
                \"decryption\": \"none\"
              },
              \"streamSettings\": {
                \"network\": \"tcp\",
                \"security\": \"reality\",
                \"realitySettings\": {
                  \"show\": false,
                  \"dest\": \"www.google.com:443\",
                  \"xver\": 0,
                  \"serverNames\": [\"www.google.com\"],
                  \"privateKey\": \"$PRIV\",
                  \"shortIds\": [\"$SID\"]
                }
              }
            }],
            \"outbounds\": [{\"protocol\": \"freedom\"}]
          }
EOFCONFIG
          "
          
          # جایگزینی متغیرها در فایل
          sudo sed -i "s/\$UUID/$UUID/g" /usr/local/etc/xray/config.json
          sudo sed -i "s/\$PRIV/$PRIV/g" /usr/local/etc/xray/config.json
          sudo sed -i "s/\$SID/$SID/g" /usr/local/etc/xray/config.json
          
          # نمایش کانفیگ نهایی
          echo "📄 Final config:"
          sudo cat /usr/local/etc/xray/config.json
          
          # 5. ری‌استارت سرویس
          sudo systemctl restart xray
          sudo systemctl status xray --no-pager
          
          # 6. نصب و اجرای Ngrok
          curl -s https://ngrok-agent.s3.amazonaws.com/ngrok.asc | sudo tee /etc/apt/trusted.gpg.d/ngrok.asc >/dev/null
          echo "deb https://ngrok-agent.s3.amazonaws.com buster main" | sudo tee /etc/apt/sources.list.d/ngrok.list
          sudo apt update && sudo apt install -y ngrok
          ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}
          ngrok tcp 443 --log=stdout > ngrok.log &
          sleep 15
          
          # 7. استخراج آدرس
          ADDR=$(curl -s http://localhost:4040/api/tunnels | jq -r '.tunnels[0].public_url' | sed 's/tcp:\/\///')
          HOST=$(echo "$ADDR" | cut -d':' -f1)
          PORT=$(echo "$ADDR" | cut -d':' -f2)
          
          echo "======================================"
          echo "✅ SHAHAN REALITY CONFIG"
          echo "======================================"
          echo "UUID: $UUID"
          echo "Public Key: $PUB"
          echo "Short ID: $SID"
          echo "Host: $HOST"
          echo "Port: $PORT"
          echo "======================================"
          echo "📱 VLESS Link:"
          echo "vless://$UUID@$HOST:$PORT?security=reality&sni=www.google.com&fp=chrome&pbk=$PUB&sid=$SID&type=tcp&flow=xtls-rprx-vision#Shahan_Reality"
          echo "======================================"
          
      - name: Keep Alive
        run: sleep 21600
