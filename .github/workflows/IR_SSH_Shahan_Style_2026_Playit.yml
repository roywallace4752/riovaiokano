name: IR_SSH_Shahan_Style_2026_Playit
on: workflow_dispatch

jobs:
  deploy_ssh:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Setup SSH Environment
        run: |
          sudo apt-get update
          sudo apt-get install -y openssh-server sshpass jq curl gpg
          
          # ایجاد کاربر
          sudo useradd -m -s /bin/bash shahan_user || true
          echo "shahan_user:pass1234" | sudo chpasswd
          
          # استارت سرویس SSH
          sudo service ssh start
          echo "✅ SSH Service started"

      - name: Install Playit.gg Agent
        run: |
          echo "🔧 Installing Playit.gg..."
          
          # روش 1: دانلود مستقیم (اگر موجود باشد)
          ARCH=$(uname -m)
          if [ "$ARCH" = "x86_64" ]; then
            DOWNLOAD_URL="https://playit-cloud.github.io/downloads/playit/linux/amd64/playit"
          elif [ "$ARCH" = "aarch64" ]; then
            DOWNLOAD_URL="https://playit-cloud.github.io/downloads/playit/linux/arm64/playit"
          else
            DOWNLOAD_URL="https://playit-cloud.github.io/downloads/playit/linux/amd64/playit"
          fi
          
          echo "Downloading from: $DOWNLOAD_URL"
          
          # دانلود فایل
          curl -SsL "$DOWNLOAD_URL" -o playit
          chmod +x playit
          sudo mv playit /usr/local/bin/playit
          
          # تست نصب
          if playit --version 2>/dev/null || which playit >/dev/null 2>&1; then
            echo "✅ Playit.gg installed successfully"
            playit --version
          else
            echo "⚠️ Installation completed, testing connection..."
          fi

      - name: Configure & Start Playit Tunnel
        env:
          SECRET_KEY: ${{ secrets.PLAYIT_SECRET_KEY }}
        run: |
          echo "🚀 Configuring Playit tunnel..."
          
          # بررسی SECRET_KEY
          if [ -z "$SECRET_KEY" ]; then
            echo "❌ ERROR: PLAYIT_SECRET_KEY is not set!"
            echo "Please add PLAYIT_SECRET_KEY to GitHub Secrets"
            exit 1
          fi
          
          # ایجاد دایرکتوری و فایل تنظیمات
          mkdir -p ~/.config/playit_gg
          
          # ذخیره secret key در فایل
          echo "secret_key = \"$SECRET_KEY\"" > ~/.config/playit_gg/playit.toml
          chmod 600 ~/.config/playit_gg/playit.toml
          
          # اجرای Playit در پس‌زمینه
          nohup playit --no-gui > playit.log 2>&1 &
          echo $! > playit.pid
          
          # انتظار برای برقراری اتصال
          sleep 15
          
          echo "======================================"
          echo "✅ SSH Server is live via Playit.gg"
          echo "======================================"
          
          # بررسی لاگ‌ها
          if grep -i "error\|failed" playit.log > /dev/null; then
            echo "⚠️ Warning: Check logs below:"
            tail -20 playit.log
          else
            echo "✅ Playit running successfully"
            tail -20 playit.log
          fi

      - name: Connection Info
        run: |
          echo "======================================"
          echo "🔐 SSH CONNECTION DETAILS"
          echo "======================================"
          echo "User: shahan_user"
          echo "Password: pass1234"
          echo ""
          echo "⚠️ اتصال خود را از پنل Playit.gg پیدا کنید:"
          echo "https://playit.gg/account/tunnels"
          echo ""
          echo "دستور SSH (مثال):"
          echo "ssh -p PORT shahan_user@ADDRESS"
          echo "======================================"

      - name: Keep Alive
        run: |
          echo "⏱️ Runner will stay active for 6 hours..."
          
          for i in {1..360}; do
            echo "[$i/360] Keep-alive heartbeat at $(date '+%Y-%m-%d %H:%M:%S')"
            
            # بررسی اینکه Playit هنوز فعال است
            if ps aux | grep -v grep | grep "playit --no-gui" > /dev/null; then
              echo "✅ Playit is still running"
            else
              echo "⚠️ Playit process not found!"
            fi
            
            sleep 60
          done
          
          echo "❌ 6 hours timeout reached. Workflow ending..."
